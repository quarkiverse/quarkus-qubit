# JUnit Platform and jqwik property-based testing configuration
# Reduces jqwik tries for faster test execution during development
# For full coverage (1000 tries), use: mvn test -Djqwik.tries.default=1000

# Default tries for quick feedback (100 instead of default 1000)
jqwik.tries.default = 100

# Edge case mode - mix edge cases into normal generation
jqwik.edgecases.default.mode = MIXIN
