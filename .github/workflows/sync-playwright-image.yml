name: Sync Playwright Docker Image

on:
  pull_request:
    paths:
      - 'pom.xml'

permissions:
  contents: write

jobs:
  sync:
    name: Sync Playwright image tag
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Playwright Docker image version
        run: |
          MVN_VER=$(grep -oP '(?<=<playwright.version>)[^<]+' pom.xml)
          CI_VER=$(grep -oP 'playwright/java:v\K[^-]+' .github/workflows/build.yml)

          echo "Maven version: $MVN_VER"
          echo "CI image version: $CI_VER"

          if [ "$MVN_VER" = "$CI_VER" ]; then
            echo "Versions already in sync"
            exit 0
          fi

          sed -i "s|playwright/java:v${CI_VER}-|playwright/java:v${MVN_VER}-|" .github/workflows/build.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/build.yml
          git commit -m "Sync Playwright Docker image to v${MVN_VER}"
          git push
