# ============================================
# DATABASE CONFIGURATION
# ============================================
# The db.kind is set by Maven profile and passed as system property
# Quarkus uses profile prefixes (%postgresql., %mysql., etc.) for database-specific config
# Dev Services automatically starts the appropriate container based on db-kind
# Default: h2 (matches default Maven profile for fastest local development)
quarkus.datasource.db-kind=${db.kind:h2}
quarkus.datasource.devservices.enabled=true

# ============================================
# DATABASE-SPECIFIC CONTAINER IMAGES
# ============================================
# Use profile-prefixed properties to set specific container versions
# These override Dev Services defaults for reproducible builds
%postgresql.quarkus.datasource.devservices.image-name=docker.io/library/postgres:17
%mysql.quarkus.datasource.devservices.image-name=docker.io/library/mysql:8.4
%mariadb.quarkus.datasource.devservices.image-name=docker.io/library/mariadb:11
%oracle.quarkus.datasource.devservices.image-name=container-registry.oracle.com/database/free:23-slim
%mssql.quarkus.datasource.devservices.image-name=mcr.microsoft.com/mssql/server:2022-latest
%db2.quarkus.datasource.devservices.image-name=icr.io/db2_community/db2:11.5.9.0

# ============================================
# DATABASE-SPECIFIC SETTINGS
# ============================================
# H2 in-memory configuration (no container needed)
%h2.quarkus.datasource.devservices.enabled=false
%h2.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL

# Dev mode defaults to H2 for QuarkusDevModeTest (Playwright DevUI tests)
%dev.quarkus.datasource.devservices.enabled=false
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:devmode;DB_CLOSE_DELAY=-1;MODE=PostgreSQL

# Oracle requires specific settings
%oracle.quarkus.datasource.devservices.reuse=false

# MSSQL requires EULA acceptance
%mssql.quarkus.datasource.devservices.container-env.ACCEPT_EULA=Y
%mssql.quarkus.datasource.devservices.container-env.MSSQL_SA_PASSWORD=Quarkus123!

# DB2 requires license acceptance and specific settings
%db2.quarkus.datasource.devservices.container-env.LICENSE=accept
%db2.quarkus.datasource.devservices.container-env.DBNAME=testdb

# ============================================
# HIBERNATE CONFIGURATION
# ============================================
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# ============================================
# TEST OPTIMIZATIONS
# ============================================
%test.quarkus.log.level=WARN
%test.quarkus.log.category."io.quarkus".level=WARN
%test.quarkus.log.category."org.hibernate".level=WARN
%test.quarkus.hibernate-orm.log.sql=false
%test.quarkus.hibernate-orm.log.bind-parameters=false

# ============================================
# NATIVE MODE CONFIGURATION
# ============================================
%prod.quarkus.hibernate-orm.sql-load-script=import.sql

# Use Mandrel 25 for native builds (required for lambda reflection support)
# Mandrel 25 is based on GraalVM 25 which supports lambda reflection in native mode
quarkus.native.builder-image=quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-25
