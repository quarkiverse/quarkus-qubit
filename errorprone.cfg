# Error Prone configuration for quarkus-qubit
# https://errorprone.info/docs/flags

# Blanket policies
-XepDisableWarningsInGeneratedCode
-XepAllSuggestionsAsWarnings

# NullAway checks
-Xep:NullAway:WARN
-Xep:AddNullMarkedToPackageInfo:WARN
-Xep:RedundantNullCheck:WARN

# NullAway options
-XepOpt:NullAway:AnnotatedPackages=io.quarkiverse.qubit
-XepOpt:NullAway:JSpecifyMode=true
